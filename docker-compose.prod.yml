# Production-ish stack for an internet test deploy (single origin via Caddy).
#
#   Caddy (:80/:443, auto-HTTPS)
#     ├── /api/*  → backend (FastAPI, path prefix stripped)
#     └── /*      → frontend (Next.js)
#
# Only Caddy exposes host ports; db/backend/frontend stay on the internal network.
# Configure via .env.prod (see .env.prod.example), then:
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hcos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-hcos}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hcos} -d ${POSTGRES_DB:-hcos}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hcos}:${POSTGRES_PASSWORD:?set in .env.prod}@db:5432/${POSTGRES_DB:-hcos}
      JWT_SECRET: ${JWT_SECRET:?set in .env.prod}
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${PUBLIC_BASE_URL:?set in .env.prod}/api
    depends_on:
      - backend
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
    environment:
      HCOS_DOMAIN: ${HCOS_DOMAIN:?set in .env.prod}
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  caddy_data:
  caddy_config:
